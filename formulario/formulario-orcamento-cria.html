    <!-- SCHEMA.ORG -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Solicitar Orçamento — CRIA+",
        "description": "Formulário de pedido de orçamento para móveis planejados de alto padrão da CRIA+ em Luanda, Angola.",

        "isPartOf": {

          "name": "CRIA+",

          "openingHours": "Mo-Fr 08:00-18:00",
          "priceRange": "Kz Kz Kz",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Pumangol — Madeira, Rua 1",
            "addressLocality": "Luanda",
            "addressCountry": "AO"
          },
          "sameAs": [
            "https://www.instagram.com/cria__mais/",
            "https://www.facebook.com/profile.php?id=61551887450486",
            "https://www.tiktok.com/@moveisdaterra"
          ]
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {

            "position": 1,
            "name": "Início",

          },
          {

  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img
            src="../img/Logo.webp"
            style="width: 200px; height: 200px"
            alt="CRIA+ Móveis Planejados Luanda"
          />
        </div>
        <div class="tagline">Interior Design</div>
        <div class="divider"></div>
        <div class="title">Solicitar Orçamento</div>
      </div>

      <div class="card">
        <div id="form-area">
          <div class="section">
            <div class="section-label">Dados de Contacto</div>
            <div class="row">
              <div class="field">
                <label>Nome *</label>
                <input
                  type="text"
                  id="nome"
                  placeholder="O seu nome"
                  required
                />
              </div>
              <div class="field">
                <label>Telefone *</label>
                <input
                  type="tel"
                  id="telefone"
                  placeholder="+244 9XX XXX XXX"
                  required
                />
              </div>
            </div>
            <div class="field">
              <label>Email</label>
              <input type="email" id="email" placeholder="email@exemplo.com" />
            </div>
          </div>

          <div class="section">
            <div class="section-label">Detalhes do Projecto</div>

            <div class="field">
              <label>Tipo de Espaço *</label>
              <select id="espaco">
                <option value="" disabled selected>
                  Seleccione o tipo de espaço
                </option>
                <option value="Apartamento">Apartamento</option>
                <option value="Vivenda / Moradia">Vivenda / Moradia</option>
                <option value="Escritório">Escritório</option>
                <option value="Loja / Comércio">Loja / Comércio</option>
                <option value="Restaurante / Café">Restaurante / Café</option>
                <option value="Outro">Outro</option>
              </select>
            </div>

            <div class="field">
              <label>Divisões a intervir</label>
              <div class="tipos-grid">
                <div class="tipo-item">
                  <input type="checkbox" id="sala" value="Sala" /><label for="sala">Sala</label>
                </div>
                <div class="tipo-item">
                  <input type="checkbox" id="quarto" value="Quarto" /><label for="quarto">Quarto</label>
                </div>
                <div class="tipo-item">
                  <input type="checkbox" id="cozinha" value="Cozinha" /><label for="cozinha">Cozinha</label>
                </div>
                <div class="tipo-item">
                  <input type="checkbox" id="escritorio" value="Escritório" /><label for="escritorio">Escritório</label>
                </div>
                <div class="tipo-item">
                  <input type="checkbox" id="casa-banho" value="Casa de banho" /><label for="casa-banho">Casa de banho</label>
                </div>
                <div class="tipo-item">
                  <input type="checkbox" id="outro-div" value="Outro" /><label for="outro-div">Outro</label>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>Área aproximada (m²)</label>
                <input type="number" id="area" placeholder="Ex: 80" min="1" />
              </div>
              <div class="field">
                <label>Orçamento disponível</label>
                <select id="orcamento">
                  <option value="" disabled selected>Seleccione</option>
                  <option value="Menos de 500.000 Kz">Menos de 500.000 Kz</option>
                  <option value="500.000 – 1.000.000 Kz">500.000 – 1.000.000 Kz</option>
                  <option value="1.000.000 – 3.000.000 Kz">1.000.000 – 3.000.000 Kz</option>
                  <option value="Mais de 3.000.000 Kz">Mais de 3.000.000 Kz</option>
                  <option value="A definir">A definir / Flexível</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>Prazo desejado</label>
              <select id="prazo">
                <option value="" disabled selected>Quando precisa do projecto?</option>
                <option value="Urgente (menos de 1 mês)">Urgente (menos de 1 mês)</option>
                <option value="1 a 3 meses">1 a 3 meses</option>
                <option value="3 a 6 meses">3 a 6 meses</option>
                <option value="Mais de 6 meses">Mais de 6 meses</option>
                <option value="Sem prazo definido">Sem prazo definido</option>
              </select>
            </div>

            <div class="field">
              <label>Descreva o seu projecto</label>
              <textarea
                id="descricao"
                placeholder="Conte-nos mais sobre o seu espaço, estilo que prefere, referências, ou qualquer detalhe que considere importante..."
              ></textarea>
            </div>
          </div>

          <button class="btn" onclick="enviarWhatsApp()">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.526 5.845L.057 23.428a.75.75 0 00.918.918l5.638-1.47A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.513-5.228-1.406l-.374-.222-3.878 1.011 1.01-3.773-.235-.386A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
            </svg>
            Enviar pedido via WhatsApp
          </button>

          <p class="note">
            Ao clicar, abre o WhatsApp com o seu pedido já formatado.<br />
            Respondemos em até <strong style="color: var(--gold-light)">24 horas</strong>.
          </p>
        </div>

        <div class="success" id="success-area">
          <div class="success-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C9A96E" stroke-width="1.5">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <h3>Pedido enviado!</h3>
          <p>
            O seu orçamento foi enviado com sucesso.<br />A equipa CRIA+ entrará
            em contacto brevemente.
          </p>
        </div>
      </div>
    </div>

    <div class="loader">
      <div class="loader-content">
        <img src="../img/Logo.webp" alt="CRIA+" />
        <div class="loader-barra-fundo">
          <div class="loader-barra"></div>
        </div>
      </div>
    </div>

    <script src="Js/formulario.js" ></script>
  </body>
</html>
